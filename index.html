<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심
  var map = L.map('map').setView([37.659, 126.836], 15);

  // 🗺️ VWorld 배경지도
  var vworld = L.tileLayer(
    'https://api.vworld.kr/req/wmts/1.0.0/YOUR_VWORLD_KEY/Base/{z}/{y}/{x}.png',
    {
      maxZoom: 19
    }
  ).addTo(map);

  // 📦 GeoJSON 레이어 변수 (중요)
  var safehouseLayer;

  // 📦 GeoJSON 불러오기
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      safehouseLayer = L.geoJSON(data, {

        // 🔥 포인트를 "마커"로 변환
        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },

        // 팝업
        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }

      });

      // 👉 기본으로 켜기
      safehouseLayer.addTo(map);

      // 👉 레이어 컨트롤 추가
      var overlayMaps = {
        "아동안전지킴이집": safehouseLayer
      };

      L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

    });
</script>

</body>
</html>
