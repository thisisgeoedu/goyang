<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심
  var map = L.map('map').setView([37.659, 126.836], 15);

  // 🗺️ VWorld 배경지도
  var vworld = L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  // 📦 레이어 변수들
  var safehouseLayer;
  var guLayer;

  // -------------------------
  // 1️⃣ 아동안전지킴이집 (마커)
  // -------------------------
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      safehouseLayer = L.geoJSON(data, {

        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },

        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }

      }).addTo(map);

      updateLayerControl();
    });

  // -------------------------
  // 2️⃣ 구 경계 (폴리곤)
  // -------------------------
  fetch('gu.geojson')
    .then(res => res.json())
    .then(data => {

      guLayer = L.geoJSON(data, {

        // 🔥 스타일 핵심
        style: function(feature) {
          return {
            color: "#000000",      // 검정선
            weight: 3,             // 두께 3px
            dashArray: "6,6",      // 점선
            fillOpacity: 0         // 내부 투명
          };
        }

      }).addTo(map);

      updateLayerControl();
    });

  // -------------------------
  // 레이어 컨트롤 (공통)
  // -------------------------
  function updateLayerControl() {
    // 둘 다 로딩된 후 생성
    if (safehouseLayer && guLayer) {

      L.control.layers(null, {
        "아동안전지킴이집": safehouseLayer,
        "행정구 경계": guLayer
      }, { collapsed: false }).addTo(map);

    }
  }

</script>

</body>
</html>
