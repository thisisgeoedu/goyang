<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([37.65, 126.83], 11);

// 배경지도
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// GeoJSON 불러오기
fetch('safehouse.geojson')
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data, {
      onEachFeature: function (feature, layer) {
        layer.bindPopup(
          "<b>" + feature.properties.fclty_nm + "</b><br>" +
          feature.properties.adres
        );
      }
    }).addTo(map);
  });
</script>

</body>
</html>
