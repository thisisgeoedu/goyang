<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심 (WGS84)
  var map = L.map('map').setView([37.659, 126.836], 15);

  // 🗺️ VWorld 배경지도
  var vworld = L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  // 📦 GeoJSON 레이어 변수
  var safehouseLayer;

  // 📦 GeoJSON 불러오기
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      // ✅ WGS84 그대로 사용 (변환 없음)
      safehouseLayer = L.geoJSON(data, {

        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },

        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }

      }).addTo(map);

      // ✅ 레이어 ON/OFF (여기 위치 중요)
      L.control.layers(null, {
        "아동안전지킴이집": safehouseLayer
      }, { collapsed: false }).addTo(map);

    })
    .catch(err => {
      console.error("GeoJSON 로딩 오류:", err);
    });

</script>

</body>
</html>
