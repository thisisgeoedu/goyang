<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심
  var map = L.map('map').setView([37.659, 126.836], 15);

  // ✅ VWorld 안정 타일 (키 필요 없음)
  var vworld = L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    {
      maxZoom: 19
    }
  ).addTo(map);

  // 📦 레이어 변수
  var safehouseLayer;

  // 📦 GeoJSON 불러오기
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      // 🔥 좌표 변환 함수 (EPSG:3857 → WGS84)
      function toWGS84(x, y) {
        var lon = (x / 20037508.34) * 180;
        var lat = (y / 20037508.34) * 180;
        lat = 180 / Math.PI * (2 * Math.atan(Math.exp(lat * Math.PI / 180)) - Math.PI / 2);
        return [lat, lon];
      }

      safehouseLayer = L.layerGroup();

      data.features.forEach(function(feature) {

        var coords = feature.geometry.coordinates;
        var converted = toWGS84(coords[0], coords[1]);

        var marker = L.marker(converted);

        marker.bindPopup(
          "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
          (feature.properties.adres || "") + "<br>" +
          (feature.properties.telno || "")
        );

        safehouseLayer.addLayer(marker);
      });

      safehouseLayer.addTo(map);

      // ✅ 레이어 ON/OFF
      L.control.layers(null, {
        "아동안전지킴이집": safehouseLayer
      }, { collapsed: false }).addTo(map);

    })
    .catch(err => {
      console.error("GeoJSON 로딩 오류:", err);
    });

</script>

</body>
</html>
