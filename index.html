<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>고양 연습</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      color: #333;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      border-radius: 5px;
    }

    .info.legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var safehouseLayer, guLayer;
  var infantLayer, highFLayer, highMLayer, seniorLayer;

  // -------------------------
  // 색상 함수
  // -------------------------
  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        '#FFFFFF';
  }

  function populationStyle(feature) {
    var val = Number(feature.properties.val) || 0;

    return {
      fillColor: getColor(val),
      fillOpacity: val === 0 ? 0 : 0.5,
      stroke: false
    };
  }

  // -------------------------
  // 범례
  // -------------------------
  var legend = L.control({ position: 'bottomright' });

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'info legend');
    var grades = [0, 25, 50, 75, 100];

    div.innerHTML += '<b>인구 (명)</b><br>';

    for (var i = 0; i < grades.length; i++) {
      var from = grades[i];
      var to = grades[i + 1];

      div.innerHTML +=
        '<i style="background:' + getColor(from + 1) + '"></i> ' +
        from + (to ? '&ndash;' + to : '+') + '<br>';
    }

    return div;
  };

  // -------------------------
  // GeoJSON 로딩
  // -------------------------
  Promise.all([
    fetch('infant.geojson').then(r => r.json()),
    fetch('high_f.geojson').then(r => r.json()),
    fetch('high_m.geojson').then(r => r.json()),
    fetch('senior.geojson').then(r => r.json()),
    fetch('gu.geojson').then(r => r.json()),
    fetch('safehouse.geojson').then(r => r.json())
  ]).then(([infantData, highFData, highMData, seniorData, guData, safehouseData]) => {

    // 인구 레이어들 (❌ addTo(map) 안함)
    infantLayer = L.geoJSON(infantData, { style: populationStyle });
    highFLayer = L.geoJSON(highFData, { style: populationStyle });
    highMLayer = L.geoJSON(highMData, { style: populationStyle });
    seniorLayer = L.geoJSON(seniorData, { style: populationStyle });

    // 행정구
    guLayer = L.geoJSON(guData, {
      style: {
        color: "#000",
        weight: 3,
        dashArray: "6,6",
        fillOpacity: 0
      }
    }).addTo(map); 

    // 지킴이집
    safehouseLayer = L.geoJSON(safehouseData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: (feature, layer) => {
        layer.bindPopup(
          "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
          (feature.properties.adres || "") + "<br>" +
          (feature.properties.telno || "")
        );
      }
    });

    // -------------------------
    // 🔥 핵심: baseLayers (하나만 선택)
    // -------------------------
    var baseLayers = {
      "유아 인구": infantLayer,
      "여고생 인구": highFLayer,
      "남고생 인구": highMLayer,
      "노년 인구": seniorLayer
    };

    var overlays = {
      "행정구 경계": guLayer,
      "아동안전지킴이집": safehouseLayer
    };

    L.control.layers(baseLayers, overlays, {
      collapsed: false
    }).addTo(map);
  });

  // -------------------------
  // 🔥 범례 제어 (baseLayer 기준)
  // -------------------------
  map.on('baselayerchange', function(e) {
    legend.addTo(map);
  });

</script>

</body>
</html>
