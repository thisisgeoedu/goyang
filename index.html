<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  // 🗺️ 배경지도
  var vworld = L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var safehouseLayer;
  var guLayer;
  var infantLayer;

  // -------------------------
  // 🔥 색상 함수 (핵심)
  // -------------------------
  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        null;
  }

  // -------------------------
  // 1️⃣ 유아 인구 (먼저 추가 → 아래에 깔림)
  // -------------------------
  fetch('infant.geojson')
    .then(res => res.json())
    .then(data => {

      infantLayer = L.geoJSON(data, {

        style: function(feature) {
          var val = feature.properties.val || 0;

          return {
            fillColor: getColor(val),
            fillOpacity: val === 0 ? 0 : 0.5, // 0이면 완전 투명
            color: null, // 테두리 없음
            weight: 0
          };
        }

      }).addTo(map);

      updateLayerControl();
    });

  // -------------------------
  // 2️⃣ 구 경계
  // -------------------------
  fetch('gu.geojson')
    .then(res => res.json())
    .then(data => {

      guLayer = L.geoJSON(data, {
        style: function() {
          return {
            color: "#000000",
            weight: 3,
            dashArray: "6,6",
            fillOpacity: 0
          };
        }
      }).addTo(map);

      updateLayerControl();
    });

  // -------------------------
  // 3️⃣ 아동안전지킴이집 (맨 위)
  // -------------------------
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      safehouseLayer = L.geoJSON(data, {
        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },
        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }
      }).addTo(map);

      updateLayerControl();
    });

  // -------------------------
  // 레이어 컨트롤
  // -------------------------
  function updateLayerControl() {
    if (safehouseLayer && guLayer && infantLayer) {

      L.control.layers(null, {
        "유아 인구": infantLayer,
        "행정구 경계": guLayer,
        "아동안전지킴이집": safehouseLayer
      }, { collapsed: false }).addTo(map);

    }
  }
</script>
