<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    /* 🔥 범례 스타일 */
    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      color: #333;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      border-radius: 5px;
    }

    .info.legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심
  var map = L.map('map').setView([37.659, 126.836], 15);

  // 🗺️ VWorld 배경지도
  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var safehouseLayer, guLayer, infantLayer;

  // -------------------------
  // 🔥 색상 함수 (공통)
  // -------------------------
  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        '#FFFFFF';
  }

  // -------------------------
  // 🔥 범례 생성 (하지만 기본은 안 띄움)
  // -------------------------
  var legend = L.control({ position: 'bottomright' });

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'info legend');

    var grades = [0, 25, 50, 75, 100];

    div.innerHTML += '<b>유아 인구 (명)</b><br>';

    for (var i = 0; i < grades.length; i++) {
      var from = grades[i];
      var to = grades[i + 1];

      div.innerHTML +=
        '<i style="background:' + getColor(from + 1) + '"></i> ' +
        from + (to ? '&ndash;' + to : '+') + '<br>';
    }

    return div;
  };

  // -------------------------
  // 1️⃣ 유아 인구 (맨 아래)
  // -------------------------
  fetch('infant.geojson')
    .then(res => res.json())
    .then(data => {

      infantLayer = L.geoJSON(data, {
        style: function(feature) {

          // 🔥 핵심: 문자열 → 숫자 변환
          var val = Number(feature.properties.val) || 0;

          return {
            fillColor: getColor(val),
            fillOpacity: val === 0 ? 0 : 0.5,
            stroke: false
          };
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 2️⃣ 구 경계
  // -------------------------
  fetch('gu.geojson')
    .then(res => res.json())
    .then(data => {

      guLayer = L.geoJSON(data, {
        style: function() {
          return {
            color: "#000000",
            weight: 3,
            dashArray: "6,6",
            fillOpacity: 0
          };
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 3️⃣ 아동안전지킴이집 (맨 위)
  // -------------------------
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      safehouseLayer = L.geoJSON(data, {
        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },
        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 레이어 컨트롤
  // -------------------------
  function checkReady() {
    if (safehouseLayer && guLayer && infantLayer) {

      L.control.layers(null, {
        "유아 인구": infantLayer,
        "행정구 경계": guLayer,
        "아동안전지킴이집": safehouseLayer
      }, { collapsed: false }).addTo(map);

    }
  }

  // -------------------------
  // 🔥 범례 ON/OFF (핵심 기능)
  // -------------------------
  map.on('overlayadd', function(e) {
    if (e.name === "유아 인구") {
      legend.addTo(map);
    }
  });

  map.on('overlayremove', function(e) {
    if (e.name === "유아 인구") {
      map.removeControl(legend);
    }
  });

</script>

</body>
</html>
