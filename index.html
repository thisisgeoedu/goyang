<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>고양 연습</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .leaflet-top.leaflet-left .leaflet-control-layers {
      margin-top: 60px;
    }

    #bufferUI {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      font-size: 13px;
      width: 200px;
    }

    #introOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
    }

    #introBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 35px 30px;
      border-radius: 12px;
      width: 440px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .intro-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .intro-desc { font-size: 14px; margin-bottom: 15px; }
    .intro-example { font-size: 12px; color: #777; margin-bottom: 25px; }

    #introBox button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      background: #3388ff;
      color: white;
      cursor: pointer;
    }

    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      color: #333;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      border-radius: 5px;
    }

    .info.legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- 버퍼 UI -->
<div id="bufferUI">
  <b>버퍼 분석</b><br><br>

  <label><input type="radio" name="bufferTarget" value="safehouse"> 아동안전지킴이집</label><br>
  <label><input type="radio" name="bufferTarget" value="cool"> 무더위쉼터</label><br>
  <label><input type="radio" name="bufferTarget" value="subway"> 도시철도</label><br>
  <label><input type="radio" name="bufferTarget" value="olive"> 올리브영</label><br>

  <!-- 추가 -->
  <label><input type="radio" name="bufferTarget" value="karaoke"> 단란/유흥주점</label><br>
  <label><input type="radio" name="bufferTarget" value="study"> 스터디카페</label><br>
  <label><input type="radio" name="bufferTarget" value="dust"> 먼지발생사업장</label><br>
  <label><input type="radio" name="bufferTarget" value="air"> 대기오염배출시설</label>

  <br><br>

  거리(m)<br>
  <input type="number" id="bufferDistance" value="100" style="width:100%">

  <br><br>

  <button onclick="updateBuffer()" style="width:100%">버퍼 실행</button>
  <button onclick="clearBuffer()" style="width:100%; margin-top:5px;">초기화</button>
</div>

<!-- 시작 안내 -->
<div id="introOverlay">
  <div id="introBox">
    <div class="intro-title">
      '공간 정의' : 공간적 측면에서 사회적으로 가치 있는 자원과 그 자원으로의 접근성이 공정하게 분배되었는가
    </div>
    <div class="intro-desc">
      우리 삶에 영향을 미치는 편의⋅안전⋅기피 시설의 지역 격차 등 공간 불평등 사례를 파악하기
    </div>
    <div class="intro-example">
      ex) 유아 인구는 많지만 아동안전지킴이집이 가까운 곳에 없는 동네는?
    </div>
    <button onclick="closeIntro()">확인</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([37.659, 126.836], 15);

L.tileLayer(
  'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
  { maxZoom: 19 }
).addTo(map);

var bufferLayer = L.layerGroup().addTo(map);

var guLayer;
var safehouseLayer, coolLayer, subwayLayer, oliveLayer;
var karaokeLayer, studyLayer, dustLayer, airLayer;
var infantLayer, highFLayer, highMLayer, seniorLayer;

// 🔥 안전 fetch
function safeFetch(url) {
  return fetch(url)
    .then(r => r.ok ? r.json() : null)
    .catch(() => null);
}

function getColor(val) {
  return val >= 100 ? '#800026' :
         val >= 75  ? '#BD0026' :
         val >= 50  ? '#E31A1C' :
         val >= 25  ? '#FC4E2A' :
         val > 0    ? '#FD8D3C' :
                      '#FFFFFF';
}

function populationStyle(feature) {
  var val = Number(feature.properties.val) || 0;
  return {
    fillColor: getColor(val),
    fillOpacity: val === 0 ? 0 : 0.5,
    stroke: false
  };
}

function bindSimplePopup(feature, layer) {
  let html = "";
  for (let key in feature.properties) {
    html += `<b>${key}</b>: ${feature.properties[key]}<br>`;
  }
  layer.bindPopup(html);
}

function getSelectedLayer() {
  const selected = document.querySelector('input[name="bufferTarget"]:checked');
  if (!selected) return null;

  const mapObj = {
    safehouse: safehouseLayer,
    cool: coolLayer,
    subway: subwayLayer,
    olive: oliveLayer,
    karaoke: karaokeLayer,
    study: studyLayer,
    dust: dustLayer,
    air: airLayer
  };

  return mapObj[selected.value];
}

function updateBuffer() {
  const layer = getSelectedLayer();
  const distance = Number(document.getElementById("bufferDistance").value);

  if (!layer) {
    alert("대상을 선택하세요");
    return;
  }

  bufferLayer.clearLayers();

  layer.eachLayer(function(l) {
    if (l.getLatLng) {
      L.circle(l.getLatLng(), {
        radius: distance,
        fillColor: '#3388ff',
        fillOpacity: 0.15,
        stroke: false
      }).addTo(bufferLayer);
    }
  });
}

function clearBuffer() {
  bufferLayer.clearLayers();
}

function closeIntro() {
  document.getElementById("introOverlay").style.display = "none";
}

var legend = L.control({ position: 'bottomright' });
legend.onAdd = function () {
  var div = L.DomUtil.create('div', 'info legend');
  var grades = [0,25,50,75,100];
  div.innerHTML += '<b>인구 (명)</b><br>';
  for (var i=0;i<grades.length;i++){
    var from = grades[i];
    var to = grades[i+1];
    div.innerHTML +=
      '<i style="background:' + getColor(from+1) + '"></i> ' +
      from + (to ? '&ndash;' + to : '+') + '<br>';
  }
  return div;
};

Promise.all([
  safeFetch('gu.geojson'),
  safeFetch('infant.geojson'),
  safeFetch('high_f.geojson'),
  safeFetch('high_m.geojson'),
  safeFetch('senior.geojson'),
  safeFetch('safehouse.geojson'),
  safeFetch('cool.geojson'),
  safeFetch('subway.geojson'),
  safeFetch('olive.geojson'),
  safeFetch('karaoke.json'),
  safeFetch('study.json'),
  safeFetch('dust.json'),
  safeFetch('air.json')
])
.then(([guData, infantData, highFData, highMData, seniorData,
        safehouseData, coolData, subwayData, oliveData,
        karaokeData, studyData, dustData, airData]) => {

  if (infantData) infantLayer = L.geoJSON(infantData, { style: populationStyle });
  if (highFData) highFLayer = L.geoJSON(highFData, { style: populationStyle });
  if (highMData) highMLayer = L.geoJSON(highMData, { style: populationStyle });
  if (seniorData) seniorLayer = L.geoJSON(seniorData, { style: populationStyle });

  if (guData) {
    guLayer = L.geoJSON(guData, {
      style: { color:"#000", weight:3, dashArray:"6,6", fillOpacity:0 }
    }).addTo(map);
  }

  function makeLayer(data){
    return data ? L.geoJSON(data, {
      pointToLayer:(f,latlng)=>L.marker(latlng),
      onEachFeature: bindSimplePopup
    }) : null;
  }

  safehouseLayer = makeLayer(safehouseData);
  coolLayer = makeLayer(coolData);
  subwayLayer = makeLayer(subwayData);
  oliveLayer = makeLayer(oliveData);
  karaokeLayer = makeLayer(karaokeData);
  studyLayer = makeLayer(studyData);
  dustLayer = makeLayer(dustData);
  airLayer = makeLayer(airData);

  var baseLayers = {};
  if (infantLayer) baseLayers["유아 인구"] = infantLayer;
  if (highFLayer) baseLayers["여고생 인구"] = highFLayer;
  if (highMLayer) baseLayers["남고생 인구"] = highMLayer;
  if (seniorLayer) baseLayers["노년 인구"] = seniorLayer;

  var overlays = {};
  if (guLayer) overlays["행정구 경계"] = guLayer;
  if (safehouseLayer) overlays["아동안전지킴이집"] = safehouseLayer;
  if (coolLayer) overlays["무더위쉼터"] = coolLayer;
  if (subwayLayer) overlays["도시철도"] = subwayLayer;
  if (oliveLayer) overlays["올리브영"] = oliveLayer;
  if (karaokeLayer) overlays["단란/유흥주점"] = karaokeLayer;
  if (studyLayer) overlays["스터디카페"] = studyLayer;
  if (dustLayer) overlays["먼지발생사업장"] = dustLayer;
  if (airLayer) overlays["대기오염배출시설"] = airLayer;

  L.control.layers(baseLayers, overlays, {
    collapsed:false,
    position:'topleft'
  }).addTo(map);
});

map.on('baselayerchange', function() {
  legend.addTo(map);
});
</script>

</body>
</html>
