<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>고양 연습</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    /* 🔥 레이어 패널 (좌상단 + 줌 버튼 안 겹치게) */
    .leaflet-top.leaflet-left .leaflet-control-layers {
      margin-top: 60px;
    }

    /* 🔥 버퍼 UI (우상단, 기존 방식 유지) */
    #bufferUI {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      font-size: 13px;
      width: 180px;
    }

    /* 🔥 범례 */
    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      color: #333;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      border-radius: 5px;
    }

    .info.legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- 🔥 버퍼 패널 -->
<div id="bufferUI">
  <b>버퍼 분석</b><br><br>

  <label>레이어 선택</label><br>
  <select id="bufferLayer">
    <option value="safehouse">아동안전지킴이집</option>
    <option value="cool">무더위쉼터</option>
    <option value="subway">도시철도</option>
    <option value="olive">올리브영</option>
  </select>

  <br><br>

  <label>거리 (m)</label><br>
  <input type="number" id="bufferDist" value="100" style="width: 100%;">

  <br><br>

  <button id="bufferBtn" style="width:100%">버퍼 실행</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var guLayer;
  var safehouseLayer, coolLayer, subwayLayer, oliveLayer;
  var infantLayer, highFLayer, highMLayer, seniorLayer;

  // -------------------------
  // 색상 함수
  // -------------------------
  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        '#FFFFFF';
  }

  function populationStyle(feature) {
    var val = Number(feature.properties.val) || 0;

    return {
      fillColor: getColor(val),
      fillOpacity: val === 0 ? 0 : 0.5,
      stroke: false
    };
  }

  // -------------------------
  // 🔥 공통 팝업 함수
  // -------------------------
  function bindSimplePopup(feature, layer) {
    let html = "";
    for (let key in feature.properties) {
      html += `<b>${key}</b>: ${feature.properties[key]}<br>`;
    }
    layer.bindPopup(html);
  }

  // -------------------------
  // 범례
  // -------------------------
  var legend = L.control({ position: 'bottomright' });

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'info legend');
    var grades = [0, 25, 50, 75, 100];

    div.innerHTML += '<b>인구 (명)</b><br>';

    for (var i = 0; i < grades.length; i++) {
      var from = grades[i];
      var to = grades[i + 1];

      div.innerHTML +=
        '<i style="background:' + getColor(from + 1) + '"></i> ' +
        from + (to ? '&ndash;' + to : '+') + '<br>';
    }

    return div;
  };

  // -------------------------
  // GeoJSON 로딩
  // -------------------------
  Promise.all([
    fetch('gu.geojson').then(r => r.json()),
    fetch('infant.geojson').then(r => r.json()),
    fetch('high_f.geojson').then(r => r.json()),
    fetch('high_m.geojson').then(r => r.json()),
    fetch('senior.geojson').then(r => r.json()),
    fetch('safehouse.geojson').then(r => r.json()),
    fetch('cool.geojson').then(r => r.json()), 
    fetch('subway.geojson').then(r => r.json()),
    fetch('olive.geojson').then(r => r.json())
  ])
  .then(([guData, infantData, highFData, highMData, seniorData, safehouseData, coolData, subwayData, oliveData]) => {

    // 인구
    infantLayer = L.geoJSON(infantData, { style: populationStyle });
    highFLayer = L.geoJSON(highFData, { style: populationStyle });
    highMLayer = L.geoJSON(highMData, { style: populationStyle });
    seniorLayer = L.geoJSON(seniorData, { style: populationStyle });

    // 행정구
    guLayer = L.geoJSON(guData, {
      style: {
        color: "#000",
        weight: 3,
        dashArray: "6,6",
        fillOpacity: 0
      }
    }).addTo(map);

    // 시설 (🔥 전부 팝업 적용)
    safehouseLayer = L.geoJSON(safehouseData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    coolLayer = L.geoJSON(coolData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    subwayLayer = L.geoJSON(subwayData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    oliveLayer = L.geoJSON(oliveData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    // 레이어 컨트롤
    var baseLayers = {
      "유아 인구": infantLayer,
      "여고생 인구": highFLayer,
      "남고생 인구": highMLayer,
      "노년 인구": seniorLayer
    };

    var overlays = {
      "행정구 경계": guLayer,
      "아동안전지킴이집": safehouseLayer,
      "무더위쉼터": coolLayer,
      "도시철도": subwayLayer,
      "올리브영": oliveLayer
    };

    L.control.layers(baseLayers, overlays, {
      collapsed: false,
      position: 'topleft'
    }).addTo(map);
  });

  // 범례 표시
  map.on('baselayerchange', function() {
    legend.addTo(map);
  });

</script>

</body>
</html>
