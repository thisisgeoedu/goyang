<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>공간 정의 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    /* 레이어 패널 위치 */
    .leaflet-top.leaflet-left .leaflet-control-layers {
      margin-top: 60px;
    }

    /* 버퍼 UI */
    #bufferUI {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      font-size: 13px;
      width: 180px;
    }

    /* 🔥 안내 오버레이 */
    #introOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
    }

    #introBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      background: white;
      padding: 35px 30px;
      border-radius: 12px;
      width: 440px;
      text-align: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }

    .intro-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .intro-desc {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .intro-example {
      font-size: 12px;
      color: #777;
      margin-bottom: 25px;
    }

    #introBox button {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      background: #3388ff;
      color: white;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -60%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- 🔥 버퍼 UI -->
<div id="bufferUI">
  <b>버퍼 분석</b><br><br>

  <label><input type="radio" name="bufferTarget" value="safehouse"> 아동안전지킴이집</label><br>
  <label><input type="radio" name="bufferTarget" value="cool"> 무더위쉼터</label><br>
  <label><input type="radio" name="bufferTarget" value="subway"> 도시철도</label><br>
  <label><input type="radio" name="bufferTarget" value="olive"> 올리브영</label>

  <br><br>

  거리(m)<br>
  <input type="number" id="bufferDistance" value="100" style="width:100%">

  <br><br>

  <button onclick="updateBuffer()" style="width:100%">버퍼 실행</button>
  <button onclick="clearBuffer()" style="width:100%; margin-top:5px;">초기화</button>
</div>

<!-- 🔥 시작 안내 -->
<div id="introOverlay">
  <div id="introBox">

    <div class="intro-title">
      '공간 정의' : 공간적 측면에서 사회적으로 가치 있는 자원과 그 자원으로의 접근성이 공정하게 분배되었는가
    </div>

    <div class="intro-desc">
      우리 삶에 영향을 미치는 편의⋅안전⋅기피 시설의 지역 격차 등 공간 불평등 사례를 파악하기
    </div>

    <div class="intro-example">
      ex) 유아 인구는 많지만 아동안전지킴이집이 가까운 곳에 없는 동네는?
    </div>

    <button onclick="closeIntro()">확인</button>

  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var bufferLayer = L.layerGroup().addTo(map);

  var guLayer;
  var safehouseLayer, coolLayer, subwayLayer, oliveLayer;
  var infantLayer, highFLayer, highMLayer, seniorLayer;

  function bindSimplePopup(feature, layer) {
    let html = "";
    for (let key in feature.properties) {
      html += `<b>${key}</b>: ${feature.properties[key]}<br>`;
    }
    layer.bindPopup(html);
  }

  function getSelectedLayer() {
    const selected = document.querySelector('input[name="bufferTarget"]:checked');
    if (!selected) return null;

    if (selected.value === "safehouse") return safehouseLayer;
    if (selected.value === "cool") return coolLayer;
    if (selected.value === "subway") return subwayLayer;
    if (selected.value === "olive") return oliveLayer;
  }

  function updateBuffer() {
    const layer = getSelectedLayer();
    const distance = Number(document.getElementById("bufferDistance").value);

    if (!layer) {
      alert("대상을 선택하세요");
      return;
    }

    bufferLayer.clearLayers();

    layer.eachLayer(function(l) {
      if (l.getLatLng) {
        L.circle(l.getLatLng(), {
          radius: distance,
          fillColor: '#3388ff',
          fillOpacity: 0.15,
          stroke: false
        }).addTo(bufferLayer);
      } else if (l.getBounds) {
        const center = l.getBounds().getCenter();
        L.circle(center, {
          radius: distance,
          fillColor: '#3388ff',
          fillOpacity: 0.15,
          stroke: false
        }).addTo(bufferLayer);
      }
    });
  }

  function clearBuffer() {
    bufferLayer.clearLayers();
  }

  function closeIntro() {
    document.getElementById("introOverlay").style.display = "none";
  }

  Promise.all([
    fetch('gu.geojson').then(r => r.json()),
    fetch('safehouse.geojson').then(r => r.json()),
    fetch('cool.geojson').then(r => r.json()),
    fetch('subway.geojson').then(r => r.json()),
    fetch('olive.geojson').then(r => r.json())
  ])
  .then(([guData, safehouseData, coolData, subwayData, oliveData]) => {

    guLayer = L.geoJSON(guData).addTo(map);

    safehouseLayer = L.geoJSON(safehouseData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    coolLayer = L.geoJSON(coolData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    subwayLayer = L.geoJSON(subwayData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    oliveLayer = L.geoJSON(oliveData, {
      pointToLayer: (f, latlng) => L.marker(latlng),
      onEachFeature: bindSimplePopup
    });

    var overlays = {
      "행정구 경계": guLayer,
      "아동안전지킴이집": safehouseLayer,
      "무더위쉼터": coolLayer,
      "도시철도": subwayLayer,
      "올리브영": oliveLayer
    };

    L.control.layers(null, overlays, {
      collapsed: false,
      position: 'topleft'
    }).addTo(map);
  });

</script>

</body>
</html>
