<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  // ✅ VWorld
  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var safehouseLayer, guLayer, infantLayer;

  // 🔥 색상 함수
  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        null;
  }

  // -------------------------
  // 1️⃣ 유아 인구
  // -------------------------
  fetch('infant.geojson')
    .then(res => res.json())
    .then(data => {

      infantLayer = L.geoJSON(data, {
        style: function(feature) {
          var val = Number(feature.properties.val) || 0;

          return {
            fillColor: getColor(val),
            fillOpacity: val === 0 ? 0 : 0.5,
            stroke: false   // ✅ 테두리 제거 (이게 정답)
          };
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 2️⃣ 구 경계
  // -------------------------
  fetch('gu.geojson')
    .then(res => res.json())
    .then(data => {

      guLayer = L.geoJSON(data, {
        style: function() {
          return {
            color: "#000000",
            weight: 3,
            dashArray: "6,6",
            fillOpacity: 0
          };
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 3️⃣ 지킴이집
  // -------------------------
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      safehouseLayer = L.geoJSON(data, {
        pointToLayer: function (feature, latlng) {
          return L.marker(latlng);
        },
        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }
      }).addTo(map);

      checkReady();
    });

  // -------------------------
  // 레이어 컨트롤
  // -------------------------
  function checkReady() {
    if (safehouseLayer && guLayer && infantLayer) {

      L.control.layers(null, {
        "유아 인구": infantLayer,
        "행정구 경계": guLayer,
        "아동안전지킴이집": safehouseLayer
      }, { collapsed: false }).addTo(map);

    }
  }

</script>

</body>
</html>
