<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>아동안전지킴이집 지도</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // 📍 성사고등학교 중심
  var map = L.map('map').setView([37.659, 126.836], 16);

  // 🗺️ VWorld 배경지도
  L.tileLayer(
    'https://api.vworld.kr/req/wmts/1.0.0/AA286675-6915-3AAB-AC92-D5BCB53906D4/Base/{z}/{y}/{x}.png',
    {
      maxZoom: 19
    }
  ).addTo(map);

  // 📦 GeoJSON 불러오기
  fetch('safehouse.geojson')
    .then(res => res.json())
    .then(data => {

      L.geoJSON(data, {

        onEachFeature: function (feature, layer) {
          layer.bindPopup(
            "<b>" + (feature.properties.fclty_nm || "") + "</b><br>" +
            (feature.properties.adres || "") + "<br>" +
            (feature.properties.telno || "")
          );
        }

      }).addTo(map);

    });
</script>

</body>
</html>
