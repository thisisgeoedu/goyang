<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>고양 연습</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    /* 인구 제목 */
    .leaflet-control-layers-base::before {
      content: "인구";
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* 좌측 패널 구분 */
    .leaflet-control-layers-overlays::before {
      content: "행정구역 및 시설";
      display: block;
      font-weight: 600;
      margin: 6px 0;
    }

    .leaflet-control-layers-overlays label:nth-child(2)::before {
      content: "";
      display: block;
      border-top: 1px solid #ccc;
      margin: 6px 0;
    }

    /* 🔥 우측 버퍼 UI */
    #bufferUI {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      font-size: 13px;
      width: 180px;
    }

    .info.legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      line-height: 18px;
      color: #333;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- 🔥 버퍼 UI -->
<div id="bufferUI">
  <b>버퍼 분석</b><br><br>

  대상:<br>
  <label><input type="radio" name="bufferTarget" value="safehouse"> 지킴이집</label><br>
  <label><input type="radio" name="bufferTarget" value="cool"> 무더위쉼터</label><br>
  <label><input type="radio" name="bufferTarget" value="subway"> 도시철도</label><br>
  <label><input type="radio" name="bufferTarget" value="olive"> 올리브영</label><br><br>

  거리(m):<br>
  <input type="number" id="bufferDistance" value="200"><br><br>

  <button onclick="updateBuffer()">생성</button>
  <button onclick="clearBuffer()">초기화</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([37.659, 126.836], 15);

  L.tileLayer(
    'https://xdworld.vworld.kr/2d/Base/service/{z}/{x}/{y}.png',
    { maxZoom: 19 }
  ).addTo(map);

  var guLayer;
  var safehouseLayer, coolLayer, subwayLayer, oliveLayer;
  var infantLayer, highFLayer, highMLayer, seniorLayer;

  var bufferLayer = L.layerGroup().addTo(map); // 🔥 버퍼 레이어

  function getColor(val) {
    return val >= 100 ? '#800026' :
           val >= 75  ? '#BD0026' :
           val >= 50  ? '#E31A1C' :
           val >= 25  ? '#FC4E2A' :
           val > 0    ? '#FD8D3C' :
                        '#FFFFFF';
  }

  function populationStyle(feature) {
    var val = Number(feature.properties.val) || 0;

    return {
      fillColor: getColor(val),
      fillOpacity: val === 0 ? 0 : 0.5,
      stroke: false
    };
  }

  // -------------------------
  // 데이터 로딩
  // -------------------------
  Promise.all([
    fetch('gu.geojson').then(r => r.json()),
    fetch('infant.geojson').then(r => r.json()),
    fetch('high_f.geojson').then(r => r.json()),
    fetch('high_m.geojson').then(r => r.json()),
    fetch('senior.geojson').then(r => r.json()),
    fetch('safehouse.geojson').then(r => r.json()),
    fetch('cool.geojson').then(r => r.json()),
    fetch('subway.geojson').then(r => r.json()),
    fetch('olive.geojson').then(r => r.json())
  ])
  .then(([guData, infantData, highFData, highMData, seniorData, safehouseData, coolData, subwayData, oliveData]) => {

    infantLayer = L.geoJSON(infantData, { style: populationStyle });
    highFLayer = L.geoJSON(highFData, { style: populationStyle });
    highMLayer = L.geoJSON(highMData, { style: populationStyle });
    seniorLayer = L.geoJSON(seniorData, { style: populationStyle });

    guLayer = L.geoJSON(guData, {
      style: {
        color: "#000",
        weight: 3,
        dashArray: "6,6",
        fillOpacity: 0
      }
    }).addTo(map);

    safehouseLayer = L.geoJSON(safehouseData, {
      pointToLayer: (f, latlng) => L.marker(latlng)
    });

    coolLayer = L.geoJSON(coolData, {
      pointToLayer: (f, latlng) => L.marker(latlng)
    });

    subwayLayer = L.geoJSON(subwayData, {
      pointToLayer: (f, latlng) => L.marker(latlng)
    });

    oliveLayer = L.geoJSON(oliveData, {
      pointToLayer: (f, latlng) => L.marker(latlng)
    });

    var baseLayers = {
      "유아 인구": infantLayer,
      "여고생 인구": highFLayer,
      "남고생 인구": highMLayer,
      "노년 인구": seniorLayer
    };

    var overlays = {
      "행정구 경계": guLayer,
      "아동안전지킴이집": safehouseLayer,
      "무더위쉼터": coolLayer,
      "도시철도": subwayLayer,
      "올리브영": oliveLayer
    };

    L.control.layers(baseLayers, overlays, {
      collapsed: false
    }).addTo(map);
  });

  // -------------------------
  // 🔥 버퍼 기능
  // -------------------------

  function getSelectedLayer() {
    const selected = document.querySelector('input[name="bufferTarget"]:checked');
    if (!selected) return null;

    if (selected.value === "safehouse") return safehouseLayer;
    if (selected.value === "cool") return coolLayer;
    if (selected.value === "subway") return subwayLayer;
    if (selected.value === "olive") return oliveLayer;
  }

  function updateBuffer() {
    const layer = getSelectedLayer();
    const distance = Number(document.getElementById("bufferDistance").value);

    if (!layer) {
      alert("대상을 선택하세요");
      return;
    }

    bufferLayer.clearLayers();

    layer.eachLayer(function(l) {
      if (l.getLatLng) {
        L.circle(l.getLatLng(), {
          radius: distance,
          stroke: false,
          fillColor: '#3388ff',
          fillOpacity: 0.15
        }).addTo(bufferLayer);
      }
    });
  }

  function clearBuffer() {
    bufferLayer.clearLayers();
  }

</script>

</body>
</html>
